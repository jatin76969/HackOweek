<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ASCII Art Canvas</title>
  <style>
    :root {
      --bg-color: #0d0d0d;
      --text-color: #00ff00;
      --grid-border: #333;
      --panel-bg: #1a1a1a;
      --btn-bg: #2a2a2a;
      --btn-hover: #404040;
    }
    body {
      margin: 0;
      background-color: var(--bg-color);
      color: white;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      user-select: none;
    }
    /* Toolbar Styling */
    .toolbar {
      width: 100%;
      max-width: 1000px;
      padding: 15px;
      background-color: var(--panel-bg);
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      align-items: center;
      justify-content: center;
      border-bottom: 2px solid var(--grid-border);
      box-sizing: border-box;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }
    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #000;
      padding: 8px 15px;
      border-radius: 8px;
      border: 1px solid #2a2a2a;
    }
    .toolbar-group label {
      font-size: 14px;
      color: #aaa;
    }
    input[type="text"] {
      width: 40px;
      height: 34px;
      text-align: center;
      font-size: 18px;
      background: var(--bg-color);
      color: var(--text-color);
      border: 1px solid var(--grid-border);
      border-radius: 6px;
      font-family: monospace;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus {
      outline: none;
      border-color: var(--text-color);
    }
    input[type="color"] {
      width: 34px;
      height: 34px;
      border: none;
      padding: 0;
      background: none;
      cursor: pointer;
    }
    input[type="color"]::-webkit-color-swatch-wrapper {
      padding: 0;
    }
    input[type="color"]::-webkit-color-swatch {
      border: 1px solid var(--grid-border);
      border-radius: 4px;
    }
    button {
      background-color: var(--btn-bg);
      color: white;
      border: 1px solid var(--grid-border);
      padding: 8px 14px;
      cursor: pointer;
      border-radius: 6px;
      font-family: inherit;
      font-size: 14px;
      transition: all 0.2s ease;
    }
    button:hover:not(:disabled) { 
      background-color: var(--btn-hover); 
      transform: translateY(-1px);
    }
    button:active:not(:disabled) {
      transform: translateY(1px);
    }
    button.active {
      background-color: var(--text-color);
      color: black;
      font-weight: bold;
      box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
    }
    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .history-info {
      font-size: 14px;
      min-width: 90px;
      text-align: center;
      color: #aaa;
      font-family: monospace;
    }
    
    /* Canvas Styling */
    .canvas-container {
      margin-top: 40px;
      padding: 20px;
      background-color: var(--panel-bg);
      border-radius: 12px;
      border: 1px solid var(--grid-border);
      box-shadow: 0 10px 40px rgba(0,0,0,0.7);
    }
    #canvas {
      display: grid;
      grid-template-columns: repeat(40, 22px);
      grid-template-rows: repeat(20, 26px);
      background-color: var(--bg-color);
      border: 1px solid var(--grid-border);
      border-radius: 4px;
      overflow: hidden;
    }
    .cell {
      width: 22px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      border-right: 1px dashed rgba(255, 255, 255, 0.05);
      border-bottom: 1px dashed rgba(255, 255, 255, 0.05);
      box-sizing: border-box;
      cursor: crosshair;
      transition: background-color 0.1s;
    }
    .cell:hover {
      background-color: #1a1a1a;
    }
    .cell:nth-child(40n) {
      border-right: none;
    }
    .cell:nth-last-child(-n+40) {
      border-bottom: none;
    }
    
    /* Responsive tweaks */
    @media (max-width: 950px) {
      #canvas {
        grid-template-columns: repeat(40, 18px);
        grid-template-rows: repeat(20, 22px);
      }
      .cell {
        width: 18px;
        height: 22px;
        font-size: 14px;
      }
    }
    @media (max-width: 800px) {
      #canvas {
        grid-template-columns: repeat(40, 14px);
        grid-template-rows: repeat(20, 18px);
      }
      .cell {
        width: 14px;
        height: 18px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>

  <div class="toolbar">
    <div class="toolbar-group">
      <label for="char-input">Char:</label>
      <input type="text" id="char-input" value="#" maxlength="1" />
    </div>
    <div class="toolbar-group">
      <label for="color-input">Color:</label>
      <input type="color" id="color-input" value="#00ff00" />
    </div>
    <div class="toolbar-group">
      <button id="eraser-btn" title="Toggle Eraser">Eraser</button>
      <button id="clear-btn" title="Clear Canvas">Clear All</button>
    </div>
    <div class="toolbar-group">
      <button id="undo-btn" title="Undo (Ctrl+Z)">Undo</button>
      <button id="redo-btn" title="Redo (Ctrl+Y)">Redo</button>
      <span class="history-info" id="history-counter">Step 0 of 0</span>
    </div>
    <div class="toolbar-group">
      <button id="export-btn" title="Save as .txt">Export .txt</button>
    </div>
  </div>

  <div class="canvas-container">
    <div id="canvas"></div>
  </div>

  <script>
    const COLS = 40;
    const ROWS = 20;

    const canvasEl = document.getElementById('canvas');
    const charInput = document.getElementById('char-input');
    const colorInput = document.getElementById('color-input');
    const eraserBtn = document.getElementById('eraser-btn');
    const clearBtn = document.getElementById('clear-btn');
    const undoBtn = document.getElementById('undo-btn');
    const redoBtn = document.getElementById('redo-btn');
    const historyCounter = document.getElementById('history-counter');
    const exportBtn = document.getElementById('export-btn');

    let cells = [];
    let isDragging = false;
    let isEraserMode = false;

    // History System
    // Each state is an array of cell objects: { char: 'A', color: '#fff' }
    let historyStack = [];
    let historyIndex = -1;

    function getBoardState() {
      return cells.map(cell => ({
        char: cell.textContent,
        color: cell.style.color
      }));
    }

    function applyBoardState(state) {
      for (let i = 0; i < cells.length; i++) {
        cells[i].textContent = state[i].char;
        cells[i].style.color = state[i].color;
      }
    }

    function saveState() {
      // If we're not at the end, truncate future (redo) states
      if (historyIndex < historyStack.length - 1) {
        historyStack = historyStack.slice(0, historyIndex + 1);
      }
      historyStack.push(getBoardState());
      historyIndex++;
      updateHistoryUI();
    }

    function updateHistoryUI() {
      undoBtn.disabled = (historyIndex <= 0);
      redoBtn.disabled = (historyIndex >= historyStack.length - 1);
      const totalSteps = historyStack.length > 0 ? historyStack.length - 1 : 0;
      const currentStep = historyIndex >= 0 ? historyIndex : 0;
      historyCounter.textContent = `Step ${currentStep} of ${totalSteps}`;
    }

    // Initialize Canvas Grid
    function init() {
      for (let i = 0; i < ROWS * COLS; i++) {
        const cell = document.createElement('div');
        cell.classList.add('cell');
        
        // Prevent default drag events on individual items
        cell.addEventListener('dragstart', (e) => e.preventDefault());
        
        cell.addEventListener('mousedown', (e) => {
          isDragging = true;
          paintCell(e.target);
        });
        
        cell.addEventListener('mouseenter', (e) => {
          if (isDragging) {
            paintCell(e.target);
          }
        });

        canvasEl.appendChild(cell);
        cells.push(cell);
      }

      // Initial blank state
      saveState();
      
      // Setup initial input styling
      updateInputColor();
    }

    let paintedInCurrentDrag = false;

    function paintCell(cell) {
      let char = charInput.value;
      if (char.length === 0) char = ' '; // fallback if input is empty
      if (isEraserMode) char = '';
      
      const color = isEraserMode ? '' : colorInput.value;
      
      if (cell.textContent !== char || cell.style.color !== color) {
        cell.textContent = char;
        cell.style.color = color;
        paintedInCurrentDrag = true;
      }
    }

    // Global mouseup to end drag strokes outside the canvas too
    window.addEventListener('mouseup', () => {
      if (isDragging) {
        isDragging = false;
        if (paintedInCurrentDrag) {
          saveState();
          paintedInCurrentDrag = false;
        }
      }
    });

    // Make canvas unselectable
    canvasEl.addEventListener('dragstart', (e) => e.preventDefault());
    canvasEl.addEventListener('selectstart', (e) => e.preventDefault());

    // Tools logic
    eraserBtn.addEventListener('click', () => {
      isEraserMode = !isEraserMode;
      if (isEraserMode) {
        eraserBtn.classList.add('active');
      } else {
        eraserBtn.classList.remove('active');
      }
    });

    function updateInputColor() {
      charInput.style.color = colorInput.value;
      charInput.style.borderColor = colorInput.value;
    }

    colorInput.addEventListener('input', updateInputColor);

    clearBtn.addEventListener('click', () => {
      // Only clear if it's not already completely empty
      let changed = false;
      cells.forEach(cell => {
        if (cell.textContent !== '') {
          cell.textContent = '';
          cell.style.color = '';
          changed = true;
        }
      });
      if (changed) {
        saveState();
      }
    });

    // Undo / Redo
    undoBtn.addEventListener('click', undo);
    redoBtn.addEventListener('click', redo);

    function undo() {
      if (historyIndex > 0) {
        historyIndex--;
        applyBoardState(historyStack[historyIndex]);
        updateHistoryUI();
      }
    }

    function redo() {
      if (historyIndex < historyStack.length - 1) {
        historyIndex++;
        applyBoardState(historyStack[historyIndex]);
        updateHistoryUI();
      }
    }

    // Keyboard bindings for Undo/Redo
    window.addEventListener('keydown', (e) => {
      const isMac = navigator.platform.toUpperCase().indexOf('MAC') >= 0;
      const cmdKey = isMac ? e.metaKey : e.ctrlKey;
      
      if (cmdKey && e.key.toLowerCase() === 'z') {
        if (e.shiftKey) {
          e.preventDefault();
          redo();
        } else {
          e.preventDefault();
          undo();
        }
      } else if (cmdKey && e.key.toLowerCase() === 'y') {
        e.preventDefault();
        redo();
      }
    });

    // Handle char input auto selection when clicked
    charInput.addEventListener('click', () => {
      charInput.select();
    });

    // Export .txt logic
    exportBtn.addEventListener('click', () => {
      let textContent = '';
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const index = r * COLS + c;
          const char = cells[index].textContent;
          // use real spaces instead of empty strings for the txt layout
          textContent += (char === '' || char === null) ? ' ' : char;
        }
        textContent += '\n'; // standard newline
      }

      const blob = new Blob([textContent], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'ascii_art.txt';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    });

    // Boot up
    init();
  </script>
</body>
</html>
